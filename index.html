<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>허훈 | 심리상담가</title>
<meta name="description" content="심리상담가 허훈의 소개, 상담기법, 연구 및 칼럼을 소개하는 홈페이지입니다." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&family=Noto+Serif+KR:wght@400;500&display=swap" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<a class="skip-link" href="#main">본문 바로가기</a>

<header class="nav" id="siteNav">
  <a class="nav__logo" href="#top" id="navLogo"></a>
  <button class="nav__toggle" id="navToggle" aria-expanded="false" aria-controls="navMenu" aria-label="메뉴 열기">
    <svg viewBox="0 0 18 18" width="20" height="20" aria-hidden="true"><path d="M3 5h12M3 9h12M3 13h12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <nav class="nav__menu" id="navMenu" aria-label="주요 메뉴"></nav>
</header>

<main id="main">

  <!-- 1. Hero -->
  <section id="top" class="hero">
    <img class="hero__bg" id="heroBg" src="" alt="달빛이 비치는 고요한 호수" />
    <div class="hero__scrim"></div>
    <div class="hero__inner">
      <span class="hero__rule"></span>
      <p class="hero__tag" id="heroTag"></p>
      <h1 class="hero__name" id="heroName"></h1>
      <p class="hero__role" id="heroRole"></p>
    </div>
  </section>

  <!-- 2. About -->
  <section id="about" class="content-card reveal">
    <p class="section-label">ABOUT</p>
    <h2 class="section-title">상담사 소개</h2>
    <div class="about-grid">
      <div class="about-photo-wrap">
        <img id="aboutPhoto" class="about-photo" src="" alt="" hidden />
      </div>
      <div class="about-body">
        <p id="aboutIntro" class="about-intro"></p>

        <div id="aboutValuesSection" class="about-subsection">
          <h3 class="sub-title">가치관</h3>
          <ul id="aboutValues" class="value-list"></ul>
        </div>

        <div id="aboutStrengthsSection" class="about-subsection">
          <h3 class="sub-title">강점</h3>
          <ul id="aboutStrengths" class="value-list"></ul>
        </div>

        <div id="aboutEducationSection" class="about-subsection">
          <h3 class="sub-title">학력</h3>
          <ul id="aboutEducation" class="career-list"></ul>
        </div>

        <div id="aboutCertificationsSection" class="about-subsection">
          <h3 class="sub-title">자격</h3>
          <ul id="aboutCertifications" class="career-list"></ul>
        </div>

        <div id="aboutCareerSection" class="about-subsection">
          <h3 class="sub-title">경력</h3>
          <ul id="aboutCareer" class="career-list"></ul>
        </div>
      </div>
    </div>

    <div id="activitiesSection" class="activities">
      <h3 class="sub-title">활동</h3>
      <div id="activitiesList" class="activities-list"></div>
    </div>
  </section>

  <!-- 3. Approach -->
  <section id="approach" class="content-card reveal">
    <p class="section-label">APPROACH</p>
    <h2 class="section-title">주 상담기법</h2>
    <p id="approachIntro" class="approach-intro"></p>
    <div id="approachCards" class="card-grid"></div>
  </section>

  <!-- 4. Works -->
  <section id="works" class="content-card reveal">
    <p class="section-label">COLUMN</p>
    <h2 class="section-title">연구 및 칼럼</h2>
    <div id="worksCards" class="card-grid"></div>
  </section>

  <!-- 5. Contact -->
  <section id="contact" class="contact reveal">
    <h2 class="contact__title">상담 문의</h2>
    <p class="contact__note" id="contactNote"></p>
    <a class="contact__mail" id="contactEmailLink" href=""></a>
  </section>

  <footer class="site-footer">
    <p id="footerText"></p>
  </footer>

</main>

<script src="data/content.js"></script>
<script src="js/render.js"></script>
</body>
</html>
